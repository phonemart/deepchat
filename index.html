<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DeepChat">
<meta name="theme-color" content="#1a1119">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>DeepChat</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{
    /* dark cute pink (default) */
    --bg:#1a1119; --panel:#241621; --panel2:#30202c; --border:#4a2f40;
    --text:#f8ecf3; --muted:#c9a7bb; --accent:#ff6fae; --accent2:#ffa0cd; --danger:#ff5c7c;
    --bot:#241621; --shadow:0 6px 20px rgba(255,111,174,.10);
    --glow:0 4px 16px rgba(255,111,174,.35);
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  }
  body[data-theme="light"]{
    --bg:#fff5fa; --panel:#ffffff; --panel2:#fff0f6; --border:#ffd6e8;
    --text:#5a2f42; --muted:#b07f95; --accent:#ff5fa2; --accent2:#ff92c4;
    --bot:#ffffff; --shadow:0 6px 20px rgba(255,111,174,.14);
    --glow:0 6px 18px rgba(255,111,174,.4);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{height:100%; margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Sarabun",sans-serif;
    background:
      radial-gradient(900px 500px at 100% -5%, rgba(255,111,174,.14), transparent 60%),
      radial-gradient(700px 500px at -10% 105%, rgba(160,120,255,.10), transparent 60%),
      var(--bg);
    color:var(--text); display:flex; flex-direction:column; height:100dvh; overflow:hidden;
    transition:background .3s,color .3s;
  }
  header{
    display:flex; align-items:center; gap:7px; padding:calc(10px + var(--safe-t)) 12px 10px;
    background:linear-gradient(135deg,rgba(255,111,174,.16),rgba(255,160,205,.06));
    border-bottom:1px solid var(--border); backdrop-filter:blur(8px);
  }
  .iconbtn{
    background:var(--panel2);color:var(--text);border:1px solid var(--border);
    border-radius:12px;width:37px;height:37px;font-size:16px;cursor:pointer;flex:none;
    display:flex;align-items:center;justify-content:center;transition:transform .1s;
  }
  .iconbtn:active{transform:scale(.9)}
  header .logo{
    width:34px;height:34px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-size:18px;flex:none;
    box-shadow:var(--glow);
  }
  header h1{font-size:16px;margin:0;font-weight:800;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  header select{
    background:var(--panel2);color:var(--text);border:1px solid var(--border);
    border-radius:11px;padding:8px 6px;font-size:12px;cursor:pointer;max-width:96px;
  }

  #chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
  .msg{max-width:90%;padding:11px 15px;border-radius:20px;line-height:1.55;font-size:15px;word-wrap:break-word;overflow-wrap:anywhere;box-shadow:var(--shadow)}
  .msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-bottom-right-radius:6px;white-space:pre-wrap}
  .msg.bot{align-self:flex-start;background:var(--bot);border:1px solid var(--border);border-bottom-left-radius:6px}
  .msg.bot p{margin:.4em 0} .msg.bot pre{background:rgba(0,0,0,.22);padding:10px;border-radius:12px;overflow-x:auto}
  body[data-theme="light"] .msg.bot pre{background:#fff0f6}
  .msg.bot code{background:rgba(0,0,0,.22);padding:2px 6px;border-radius:6px;font-size:13px}
  body[data-theme="light"] .msg.bot code{background:#ffe4f0}
  .msg.bot pre code{padding:0;background:none}
  .msg.bot ul,.msg.bot ol{margin:.4em 0;padding-left:1.3em}
  .msg.bot a{color:var(--accent)}
  .msg.bot table{border-collapse:collapse;width:100%;font-size:13px;margin:.4em 0;display:block;overflow-x:auto}
  .msg.bot th,.msg.bot td{border:1px solid var(--border);padding:6px 8px}
  .copybtn{margin-top:7px;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:2px 0}
  .copybtn:active{color:var(--accent)}
  .think{font-size:13px;color:var(--muted);border-left:2px solid var(--accent);padding:6px 0 6px 10px;margin-bottom:6px;white-space:pre-wrap}
  .think summary{cursor:pointer;color:var(--accent);font-weight:700;margin-bottom:4px}

  .empty{margin:auto;text-align:center;color:var(--muted);padding:16px;max-width:420px}
  .empty .big{font-size:56px;margin-bottom:6px;animation:bounce 2.4s ease-in-out infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .empty .hello{font-size:17px;font-weight:800;color:var(--text);margin-bottom:4px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
  .chip{background:var(--panel2);border:1px solid var(--border);color:var(--text);
    padding:9px 14px;border-radius:20px;font-size:13px;cursor:pointer;transition:transform .1s;box-shadow:var(--shadow)}
  .chip:active{transform:scale(.94)}

  footer{padding:10px 12px calc(10px + var(--safe-b));border-top:1px solid var(--border);
    background:linear-gradient(0deg,var(--panel),rgba(255,111,174,.04))}
  .inputbar{display:flex;gap:8px;align-items:flex-end}
  textarea{
    flex:1;background:var(--panel2);color:var(--text);border:1px solid var(--border);
    border-radius:22px;padding:12px 16px;font-size:16px;resize:none;max-height:140px;
    font-family:inherit;line-height:1.4;transition:border-color .15s;
  }
  textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,111,174,.15)}
  #send{
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;
    width:47px;height:47px;border-radius:50%;font-size:19px;cursor:pointer;flex:none;
    display:flex;align-items:center;justify-content:center;box-shadow:var(--glow);transition:transform .1s;
  }
  #send:active{transform:scale(.9)} #send:disabled{opacity:.5}
  #send.stop{background:var(--danger)}

  #down{position:absolute;right:16px;bottom:100px;width:40px;height:40px;border-radius:50%;
    background:var(--panel2);border:1px solid var(--border);color:var(--accent);font-size:18px;
    display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow);z-index:5}
  #down.show{display:flex}

  .scrim{position:fixed;inset:0;background:rgba(30,10,25,.5);opacity:0;pointer-events:none;transition:opacity .2s;z-index:20;backdrop-filter:blur(2px)}
  .scrim.show{opacity:1;pointer-events:auto}
  #drawer{position:fixed;top:0;left:0;bottom:0;width:82%;max-width:320px;background:var(--panel);
    border-right:1px solid var(--border);transform:translateX(-100%);transition:transform .22s ease;z-index:21;
    display:flex;flex-direction:column;padding-top:var(--safe-t)}
  #drawer.show{transform:translateX(0)}
  #drawer .dhead{display:flex;align-items:center;gap:8px;padding:16px;border-bottom:1px solid var(--border)}
  #drawer .dhead b{flex:1;font-size:15px}
  #newChat{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;
    border-radius:20px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:var(--glow)}
  #convs{flex:1;overflow-y:auto;padding:8px}
  .conv{display:flex;align-items:center;gap:8px;padding:11px 12px;border-radius:14px;cursor:pointer;margin-bottom:4px}
  .conv:active{background:var(--panel2)}
  .conv.active{background:var(--panel2);border:1px solid var(--border)}
  .conv .t{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .conv .del{color:var(--muted);font-size:15px;padding:2px 4px;flex:none}
  .conv .del:active{color:var(--danger)}

  .modal{position:fixed;inset:0;background:rgba(30,10,25,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:30;backdrop-filter:blur(3px)}
  .modal.show{display:flex}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:22px;width:100%;max-width:380px;box-shadow:0 20px 50px rgba(0,0,0,.35)}
  .card h2{margin:0 0 6px;font-size:18px}
  .card p{color:var(--muted);font-size:13px;margin:0 0 14px;line-height:1.5}
  .card input,.card textarea{width:100%;margin-bottom:12px}
  .card input{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:13px;padding:12px 14px;font-size:16px}
  .row{display:flex;gap:8px}
  .btn{flex:1;padding:12px;border-radius:14px;border:none;font-size:14px;font-weight:700;cursor:pointer}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:var(--glow)}
  .btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
  .hint{font-size:12px;color:var(--muted)}
  .typing{display:inline-flex;gap:4px;align-items:center;height:14px}
  .typing i{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.2s} .typing i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}

  /* ---- buddy mascot ---- */
  header .logo{background:var(--panel2);overflow:hidden;padding:0}
  header .logo svg{width:132%;height:132%;display:block;margin:-16%}
  .botrow{display:flex;gap:8px;align-self:flex-start;max-width:94%}
  .botrow .msg.bot{align-self:auto}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--panel2);border:1px solid var(--border);
    flex:none;overflow:hidden;margin-top:auto;box-shadow:var(--shadow)}
  .avatar svg{width:130%;height:130%;display:block;margin:-15%}
  .avatar.happy{animation:pop .5s ease}
  @keyframes pop{0%{transform:scale(.7)}55%{transform:scale(1.15)}100%{transform:scale(1)}}
  .empty .buddy{width:138px;height:138px;margin:0 auto 4px;animation:bounce 2.6s ease-in-out infinite;
    filter:drop-shadow(0 8px 10px rgba(255,111,174,.25))}
  .empty .buddy svg{width:100%;height:100%;display:block}
  .bplbl{font-size:12px;font-weight:700;color:var(--muted);margin:2px 0 6px}
  .bpick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .bopt{width:52px;height:52px;border-radius:14px;border:2px solid var(--border);background:var(--panel2);
    cursor:pointer;overflow:hidden;padding:2px;transition:transform .1s}
  .bopt:active{transform:scale(.92)}
  .bopt.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,111,174,.22)}
  .bopt svg{width:112%;height:112%;display:block;margin:-6%}
</style>
</head>
<body>
<header>
  <button class="iconbtn" id="menuBtn" title="ห้องแชท">☰</button>
  <div class="logo" id="logo"></div>
  <h1 id="title">DeepChat</h1>
  <select id="model">
    <option value="deepseek-chat">💬 Chat</option>
    <option value="deepseek-reasoner">🧠 Reasoner</option>
  </select>
  <button class="iconbtn" id="themeBtn" title="สลับโหมด">🌙</button>
  <button class="iconbtn" id="setBtn" title="ตั้งค่า">⚙️</button>
</header>

<div id="chat"></div>
<button id="down" title="ลงล่างสุด">↓</button>

<footer>
  <div class="inputbar">
    <textarea id="input" rows="1" placeholder="พิมพ์ข้อความ... 💬"></textarea>
    <button id="send">➤</button>
  </div>
</footer>

<!-- Drawer -->
<div class="scrim" id="scrim"></div>
<aside id="drawer">
  <div class="dhead">
    <b>💕 ห้องแชท</b>
    <button id="newChat">＋ ใหม่</button>
  </div>
  <div id="convs"></div>
</aside>

<!-- Settings -->
<div class="modal" id="modal">
  <div class="card">
    <h2>⚙️ ตั้งค่า</h2>
    <p>ใส่ DeepSeek API key ของคุณ — เก็บไว้ในเครื่องนี้เท่านั้น (localStorage) ไม่ส่งไปที่ไหน</p>
    <input type="password" id="keyInput" placeholder="sk-...">
    <p class="hint" style="margin:-4px 0 12px">System prompt (บุคลิก/บทบาทของ AI)</p>
    <textarea id="sysInput" rows="3" style="background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:13px;padding:12px 14px;font-size:14px;font-family:inherit"></textarea>
    <p class="bplbl">เลือกเพื่อนซี้ของคุณ 🐣</p>
    <div class="bpick" id="bpick"></div>
    <div class="row">
      <button class="btn ghost" id="closeSet">ยกเลิก</button>
      <button class="btn primary" id="saveSet">บันทึก</button>
    </div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
const chat=$('#chat'), input=$('#input');
const LS={key:'ds_key',sys:'ds_sys',model:'ds_model',convs:'ds_convs',cur:'ds_cur',theme:'ds_theme',buddy:'ds_buddy'};
const DEFAULT_SYS="คุณเป็นผู้ช่วยส่วนตัวที่พูดไทยเป็นกันเอง น่ารักนิดๆ ตอบกระชับ ตรงประเด็น และช่วยได้จริง";
const isTouch = matchMedia('(pointer:coarse)').matches;
const CHIPS=["✨ แต่งคำอวยพรน่ารักๆ","📝 ช่วยคิดแคปชั่นขายของ","🍳 เมนูอาหารง่ายๆ วันนี้","💡 อธิบายเรื่องยากให้เข้าใจ"];

let streaming=false, abortCtl=null;

// ---- buddy mascot ----
const BUDDIES=[{name:"Bubble the baby dolphin",idle:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240"><ellipse cx="120" cy="214" rx="58" ry="11" fill="#1a1119" opacity="0.12"/><path d="M120 170 C110 180 92 182 84 200 C104 196 114 188 120 182 C126 188 136 196 156 200 C148 182 130 180 120 170 Z" fill="#7cd0ef" stroke="#3f9fca" stroke-width="4" stroke-linejoin="round"/><path d="M108 72 C112 40 132 32 150 42 C140 54 134 64 132 74 Z" fill="#6cc6e8" stroke="#3f9fca" stroke-width="4" stroke-linejoin="round"/><path d="M74 152 C52 152 40 168 44 182 C58 176 68 168 82 160 Z" fill="#6cc6e8" stroke="#3f9fca" stroke-width="4" stroke-linejoin="round"/><ellipse cx="120" cy="126" rx="68" ry="64" fill="#7cd0ef" stroke="#3f9fca" stroke-width="4"/><ellipse cx="120" cy="158" rx="44" ry="30" fill="#eaf8ff"/><ellipse cx="98" cy="92" rx="16" ry="9" fill="#ffffff" opacity="0.35"/><circle cx="100" cy="116" r="11" fill="#34495e"/><circle cx="140" cy="116" r="11" fill="#34495e"/><circle cx="96" cy="112" r="3.6" fill="#fff"/><circle cx="136" cy="112" r="3.6" fill="#fff"/><ellipse cx="84" cy="132" rx="8" ry="5.5" fill="#ff9ec7" opacity="0.9"/><ellipse cx="156" cy="132" rx="8" ry="5.5" fill="#ff9ec7" opacity="0.9"/><path d="M108 139 Q120 150 132 139" fill="none" stroke="#3f9fca" stroke-width="3.5" stroke-linecap="round"/></svg>`,thinking:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240"><ellipse cx="120" cy="214" rx="58" ry="11" fill="#1a1119" opacity="0.12"/><path d="M120 170 C110 180 92 182 84 200 C104 196 114 188 120 182 C126 188 136 196 156 200 C148 182 130 180 120 170 Z" fill="#7cd0ef" stroke="#3f9fca" stroke-width="4" stroke-linejoin="round"/><path d="M108 72 C112 40 132 32 150 42 C140 54 134 64 132 74 Z" fill="#6cc6e8" stroke="#3f9fca" stroke-width="4" stroke-linejoin="round"/><path d="M74 152 C52 152 40 168 44 182 C58 176 68 168 82 160 Z" fill="#6cc6e8" stroke="#3f9fca" stroke-width="4" stroke-linejoin="round"/><ellipse cx="120" cy="126" rx="68" ry="64" fill="#7c Box="0 0 240 240"><ellipse cx="120" cy="212" rx="56" ry="10" fill="#3a2410" opacity=".16"/><g fill="#FFCB45" stroke="#E7A02A" stroke-width="6" stroke-linejoin="round"><ellipse cx="64" cy="138" rx="15" ry="11"/><ellipse cx="176" cy="138" rx="15" ry="11"/><path d="M120,32 L144,88 L204,93 L158,132 L172,191 L120,160 L68,191 L82,132 L36,93 L96,88 Z"/></g><ellipse cx="118" cy="72" rx="12" ry="8" fill="#FFE187" opacity=".55"/><g fill="none" stroke="#3b2a15" stroke-width="4.5" stroke-linecap="round"><path d="M90,116 Q101,105 112,116"/><path d="M128,116 Q139,105 150,116"/></g><g fill="#FF93BC" opacity=".8"><ellipse cx="86" cy="133" rx="8" ry="5.5"/><ellipse cx="154" cy="133" rx="8" ry="5.5"/></g><path d="M103,132 Q120,158 137,132 Z" fill="#A94E17"/><ellipse cx="120" cy="146" rx="8" ry="5" fill="#FF8FA6"/><path d="M56,84 L58,91 L65,93 L58,95 L56,102 L54,95 L47,93 L54,91 Z" fill="#FF7FB4"/><path d="M188,78 L190,85 L197,87 L190,89 L188,96 L186,89 L179,87 L186,85 Z" fill="#FF7FB4"/></svg>`}];
let buddyIdx=+(localStorage.getItem(LS.buddy)||0);
if(!(buddyIdx>=0&&buddyIdx<BUDDIES.length))buddyIdx=0;
function buddy(){return BUDDIES[buddyIdx]}
function paintLogo(){const l=$('#logo');if(l)l.innerHTML=buddy().idle}
function setBuddy(i){buddyIdx=i;localStorage.setItem(LS.buddy,i);paintLogo();buildBuddyPick();render()}
function buildBuddyPick(){
  const box=$('#bpick');if(!box)return;box.innerHTML='';
  BUDDIES.forEach((b,i)=>{const el=document.createElement('button');el.type='button';
    el.className='bopt'+(i===buddyIdx?' sel':'');el.innerHTML=b.idle;el.title=b.name;
    el.onclick=()=>setBuddy(i);box.appendChild(el);});
}

// ---- theme ----
function applyTheme(t){
  document.body.dataset.theme=t;
  $('#themeBtn').textContent = t==='light'?'☀️':'🌙';
  document.querySelector('meta[name=theme-color]').content = t==='light'?'#fff5fa':'#1a1119';
}
applyTheme(localStorage.getItem(LS.theme)||'dark');
$('#themeBtn').onclick=()=>{
  const t=document.body.dataset.theme==='light'?'dark':'light';
  localStorage.setItem(LS.theme,t); applyTheme(t);
};

// ---- conversation store ----
let convs = JSON.parse(localStorage.getItem(LS.convs)||'null');
if(!convs){
  const old=JSON.parse(localStorage.getItem('ds_hist')||'[]');
  convs=[{id:cid(), title:titleFrom(old), messages:old}];
  localStorage.removeItem('ds_hist');
}
let curId = localStorage.getItem(LS.cur) || convs[0].id;
if(!convs.find(c=>c.id===curId)) curId=convs[0].id;

function cid(){return 'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function cur(){return convs.find(c=>c.id===curId)}
function messages(){return cur().messages}
function titleFrom(msgs){const u=msgs.find(m=>m.role==='user');return u?u.content.slice(0,40):'แชทใหม่'}
function saveConvs(){localStorage.setItem(LS.convs,JSON.stringify(convs));localStorage.setItem(LS.cur,curId)}

// ---- init ----
$('#model').value=localStorage.getItem(LS.model)||'deepseek-chat';
paintLogo(); buildBuddyPick(); render(); renderConvs();
if(!localStorage.getItem(LS.key)) openSettings();

// ---- settings ----
function openSettings(){
  $('#keyInput').value=localStorage.getItem(LS.key)||'';
  $('#sysInput').value=localStorage.getItem(LS.sys)||DEFAULT_SYS;
  $('#modal').classList.add('show');
}
$('#setBtn').onclick=openSettings;
$('#closeSet').onclick=()=>$('#modal').classList.remove('show');
$('#saveSet').onclick=()=>{
  localStorage.setItem(LS.key,$('#keyInput').value.trim());
  localStorage.setItem(LS.sys,$('#sysInput').value.trim()||DEFAULT_SYS);
  $('#modal').classList.remove('show');
};
$('#model').onchange=e=>localStorage.setItem(LS.model,e.target.value);

// ---- drawer ----
function openDrawer(){renderConvs();$('#drawer').classList.add('show');$('#scrim').classList.add('show')}
function closeDrawer(){$('#drawer').classList.remove('show');$('#scrim').classList.remove('show')}
$('#menuBtn').onclick=openDrawer;
$('#scrim').onclick=closeDrawer;
$('#newChat').onclick=()=>{
  if(streaming)return;
  let empty=convs.find(c=>c.messages.length===0);
  if(!empty){empty={id:cid(),title:'แชทใหม่',messages:[]};convs.unshift(empty)}
  curId=empty.id; saveConvs(); render(); renderConvs(); closeDrawer();
};
function switchTo(id){if(streaming)return;curId=id;saveConvs();render();closeDrawer()}
function delConv(id){
  convs=convs.filter(c=>c.id!==id);
  if(!convs.length)convs=[{id:cid(),title:'แชทใหม่',messages:[]}];
  if(curId===id)curId=convs[0].id;
  saveConvs();render();renderConvs();
}
function renderConvs(){
  const box=$('#convs');box.innerHTML='';
  for(const c of convs){
    const el=document.createElement('div');
    el.className='conv'+(c.id===curId?' active':'');
    const t=document.createElement('div');t.className='t';t.textContent=c.title||'แชทใหม่';
    t.onclick=()=>switchTo(c.id);
    const d=document.createElement('div');d.className='del';d.textContent='🗑';
    d.onclick=ev=>{ev.stopPropagation(); if(confirm('ลบห้องแชทนี้?'))delConv(c.id)};
    el.appendChild(t);el.appendChild(d);box.appendChild(el);
  }
}

// ---- render ----
function render(){
  $('#title').textContent=cur().title||'DeepChat';
  chat.innerHTML='';
  if(!messages().length){
    const e=document.createElement('div');e.className='empty';
    e.innerHTML='<div class="buddy">'+buddy().idle+'</div><div class="hello">สวัสดีค่ะ~ 💕</div><div>เริ่มพิมพ์คุยกันได้เลย มีอะไรให้ช่วยไหม~</div>';
    const chips=document.createElement('div');chips.className='chips';
    CHIPS.forEach(c=>{const b=document.createElement('button');b.className='chip';b.textContent=c;
      b.onclick=()=>{input.value=c.replace(/^\S+\s/,'');send()};chips.appendChild(b)});
    e.appendChild(chips); chat.appendChild(e); return;
  }
  for(const m of messages()){
    if(m.reasoning){
      const d=document.createElement('details'); d.className='think';
      d.innerHTML='<summary>🧠 ความคิด</summary>'+esc(m.reasoning);
      chat.appendChild(d);
    }
    if(m.role==='user'){
      const el=document.createElement('div'); el.className='msg user'; el.textContent=m.content;
      chat.appendChild(el);
    }else{
      const wrap=document.createElement('div'); wrap.className='botrow';
      const av=document.createElement('div'); av.className='avatar'; av.innerHTML=buddy().idle;
      const el=document.createElement('div'); el.className='msg bot';
      el.innerHTML=marked.parse(m.content||''); addCopy(el,m.content);
      wrap.appendChild(av); wrap.appendChild(el); chat.appendChild(wrap);
    }
  }
  scrollDown();
}
function addCopy(el,text){
  const b=document.createElement('button');b.className='copybtn';b.textContent='📋 คัดลอก';
  b.onclick=()=>{navigator.clipboard.writeText(text);b.textContent='✓ คัดลอกแล้ว';setTimeout(()=>b.textContent='📋 คัดลอก',1500)};
  el.appendChild(b);
}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}

// ---- scroll ----
let stick=true;
chat.addEventListener('scroll',()=>{
  const near=chat.scrollHeight-chat.scrollTop-chat.clientHeight<80;
  stick=near; $('#down').classList.toggle('show',!near);
});
function scrollDown(force){if(force||stick){chat.scrollTop=chat.scrollHeight;$('#down').classList.remove('show')}}
$('#down').onclick=()=>{stick=true;scrollDown(true)};

// ---- input ----
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,140)+'px'});
input.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey&&!isTouch){e.preventDefault();send()}
});
$('#send').onclick=()=>{ if(streaming){abortCtl&&abortCtl.abort();} else send(); };

// ---- send ----
async function send(){
  if(streaming)return;
  const key=localStorage.getItem(LS.key);
  if(!key){openSettings();return;}
  const text=input.value.trim(); if(!text)return;
  input.value=''; input.style.height='auto';
  messages().push({role:'user',content:text});
  if(messages().length===1){cur().title=titleFrom(messages())}
  saveConvs(); render(); renderConvs(); stick=true; scrollDown(true);

  const model=$('#model').value;
  const sys=localStorage.getItem(LS.sys)||DEFAULT_SYS;
  const body={
    model, stream:true,
    messages:[{role:'system',content:sys},
      ...messages().map(m=>({role:m.role,content:m.content}))]
  };

  streaming=true; setSend(true);
  let thinkEl=null;
  const botWrap=document.createElement('div'); botWrap.className='botrow';
  const avEl=document.createElement('div'); avEl.className='avatar'; avEl.innerHTML=buddy().thinking;
  const botEl=document.createElement('div'); botEl.className='msg bot';
  botEl.innerHTML='<span class="typing"><i></i><i></i><i></i></span>';
  botWrap.appendChild(avEl); botWrap.appendChild(botEl);
  chat.appendChild(botWrap); scrollDown(true);

  let content='', reasoning='';
  abortCtl=new AbortController();
  try{
    const res=await fetch('https://api.deepseek.com/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify(body), signal:abortCtl.signal
    });
    if(!res.ok){throw new Error('HTTP '+res.status+' — '+(await res.text()).slice(0,200));}
    const reader=res.body.getReader(); const dec=new TextDecoder(); let buf='';
    while(true){
      const {done,value}=await reader.read(); if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop();
      for(const line of lines){
        const t=line.trim(); if(!t.startsWith('data:'))continue;
        const data=t.slice(5).trim(); if(data==='[DONE]')continue;
        try{
          const j=JSON.parse(data); const d=j.choices[0].delta;
          if(d.reasoning_content){
            reasoning+=d.reasoning_content;
            if(!thinkEl){thinkEl=document.createElement('details');thinkEl.className='think';thinkEl.open=true;thinkEl.innerHTML='<summary>🧠 กำลังคิด...</summary><span class="rc"></span>';chat.insertBefore(thinkEl,botWrap);}
            thinkEl.querySelector('.rc').textContent=reasoning;
          }
          if(d.content){content+=d.content; botEl.innerHTML=marked.parse(content);}
          scrollDown();
        }catch(_){}
      }
    }
    if(thinkEl)thinkEl.querySelector('summary').textContent='🧠 ความคิด';
  }catch(err){
    if(err.name==='AbortError'){
      if(!content){botWrap.remove(); if(thinkEl)thinkEl.remove(); streaming=false;setSend(false);abortCtl=null;return;}
    }else{
      botEl.innerHTML='<span style="color:var(--danger)">⚠️ '+esc(err.message)+'</span>';
      streaming=false; setSend(false); abortCtl=null; return;
    }
  }
  messages().push({role:'assistant',content,reasoning:reasoning||null});
  saveConvs(); streaming=false; setSend(false); abortCtl=null; render(); renderConvs();
  // buddy celebrates the finished answer
  const avs=chat.querySelectorAll('.botrow .avatar');
  const last=avs[avs.length-1];
  if(last){last.innerHTML=buddy().happy; last.classList.add('happy');
    setTimeout(()=>{if(last){last.innerHTML=buddy().idle; last.classList.remove('happy');}},1800);}
}
function setSend(on){
  const b=$('#send');
  b.classList.toggle('stop',on);
  b.textContent=on?'■':'➤';
}

// ---- PWA ----
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
